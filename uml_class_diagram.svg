<svg width="100%" viewBox="0 0 680 1480" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Sudoku UML Class Diagram – CHC6186 AOOP Coursework</title>
<desc>UML class diagram showing SudokuModel interface, SudokuModelImpl, SudokuView interface, SudokuFrame, SudokuController, SudokuGUI, SudokuCLI, SudokuModelTest, and java.util Observable/Observer.</desc>

